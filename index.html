<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Founder OS — Control Tower</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090e;--surface:#0d1018;--surface2:#12161f;--surface3:#181d28;
  --border:#1c2333;--border2:#232c3d;
  --accent:#00ff9d;--accent-dim:#00cc7a;
  --danger:#ff4444;--warn:#f59e0b;--purple:#818cf8;
  --text:#e2e8f4;--muted:#3d4d63;--muted2:#5c6f87;--muted3:#8897ad;
  --font-head:'Syne',sans-serif;--font-mono:'Space Mono',monospace;
  --radius:10px;--sidebar-w:230px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-head);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.fade-up{animation:fadeUp .35s ease both}
.fade-up-2{animation:fadeUp .35s .07s ease both}
.fade-up-3{animation:fadeUp .35s .14s ease both}
.fade-up-4{animation:fadeUp .35s .21s ease both}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{
  width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);
  position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:200;
  transition:transform .2s ease;
}
.sb-brand{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.sb-tag{font-family:var(--font-mono);font-size:9px;color:var(--accent);letter-spacing:.18em;margin-bottom:6px}
.sb-name{font-weight:800;font-size:17px;letter-spacing:-.02em}
.sb-nav{flex:1;padding:14px 10px;overflow-y:auto}
.sb-section{font-family:var(--font-mono);font-size:9px;color:var(--muted);letter-spacing:.15em;padding:10px 10px 6px}
.nav-btn{
  display:flex;align-items:center;gap:11px;width:100%;padding:9px 12px;margin-bottom:1px;
  border-radius:8px;border:none;border-left:2px solid transparent;background:transparent;
  color:var(--muted3);font-family:var(--font-head);font-weight:500;font-size:13.5px;
  cursor:pointer;text-align:left;transition:all .15s ease;
}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:#00ff9d10;color:var(--accent);border-left-color:var(--accent);font-weight:700}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-footer{padding:16px 20px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:.08em}

.main{margin-left:var(--sidebar-w);flex:1;padding:40px 48px;min-height:100vh}

/* Mobile */
.topbar{display:none;position:fixed;top:0;left:0;right:0;height:56px;background:var(--surface);border-bottom:1px solid var(--border);z-index:300;align-items:center;padding:0 16px;justify-content:space-between}
.topbar-brand{font-weight:800;font-size:15px}
.hamburger{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:6px;line-height:1}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:200;padding:8px 0 14px}
.mobile-nav-items{display:flex}
.mnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--muted);cursor:pointer;padding:4px 0;font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:.05em;transition:color .15s}
.mnav-btn.active{color:var(--accent)}
.mnav-icon{font-size:19px}
.sb-overlay{display:none;position:fixed;inset:0;background:#000a;z-index:150}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px}
.card-label{font-family:var(--font-mono);font-size:9px;color:var(--muted2);letter-spacing:.15em;text-transform:uppercase;margin-bottom:14px}

/* Page header */
.page-sup{font-family:var(--font-mono);font-size:10px;color:var(--muted2);letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px}
.page-title{font-weight:800;font-size:clamp(26px,4vw,40px);letter-spacing:-.025em;line-height:1.1}
.accent{color:var(--accent)}
.page-header{margin-bottom:32px}

/* Stat row */
.stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px}
.stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 20px;display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px}
.chip-val{font-family:var(--font-mono);font-size:26px;font-weight:700}
.chip-lbl{font-size:10px;color:var(--muted2);letter-spacing:.08em;text-transform:uppercase}

/* Buttons */
.btn{cursor:pointer;font-family:var(--font-head);font-weight:700;border-radius:7px;border:none;transition:all .15s ease;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.btn-sm{padding:7px 14px;font-size:12px}
.btn-md{padding:10px 20px;font-size:13px}
.btn-lg{padding:13px 26px;font-size:14px}
.btn-primary{background:var(--accent);color:#000;letter-spacing:.03em}
.btn-primary:hover{background:var(--accent-dim);transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted3)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-danger{background:transparent;border:1px solid #ff444428;color:var(--danger)}
.btn-danger:hover{background:#ff444412}

/* Form */
input,textarea,select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:12px;border-radius:7px;padding:10px 14px;outline:none;width:100%;transition:border-color .15s,box-shadow .15s}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px #00ff9d14}
input::placeholder,textarea::placeholder{color:var(--muted)}
select option{background:var(--surface2)}
textarea{resize:vertical;line-height:1.7}
.form-row{display:flex;gap:10px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:160px}
.form-label{font-family:var(--font-mono);font-size:10px;color:var(--muted2);letter-spacing:.1em}

/* Tags */
.tag{display:inline-flex;align-items:center;font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:.08em;padding:3px 9px;border-radius:4px;text-transform:uppercase}
.tag-active{background:#00ff9d12;color:var(--accent);border:1px solid #00ff9d25}
.tag-maintain{background:#f59e0b12;color:var(--warn);border:1px solid #f59e0b25}
.tag-incubate{background:#818cf812;color:var(--purple);border:1px solid #818cf825}
.tag-blocked{background:#ff444412;color:#ff7777;border:1px solid #ff444428}
.tag-done{background:#00ff9d10;color:var(--accent);border:1px solid #00ff9d20}
.tag-pending{background:#ffffff08;color:var(--muted3);border:1px solid var(--border)}

/* Progress */
.prog-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),#00ccff);transition:width .6s cubic-bezier(.4,0,.2,1)}

/* Venture card */
.v-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .15s,transform .15s}
.v-card:hover{transform:translateY(-2px)}
.v-glow{position:absolute;top:0;right:0;width:160px;height:160px;pointer-events:none;border-radius:50%;transition:opacity .15s}
.v-name{font-weight:800;font-size:15px;margin-bottom:5px}
.v-obj{font-family:var(--font-mono);font-size:11px;color:var(--muted2);margin-bottom:16px}
.v-stats{display:flex;gap:18px;align-items:center}
.v-stat-val{font-family:var(--font-mono);font-size:20px;font-weight:700}
.v-stat-lbl{font-size:9px;color:var(--muted);letter-spacing:.1em}
.v-metric{margin-left:auto;text-align:right}
.v-metric-val{font-family:var(--font-mono);font-size:12px;color:var(--accent)}
.v-metric-lbl{font-size:9px;color:var(--muted)}

/* Task item */
.task-item{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 16px;transition:border-color .15s,opacity .15s}
.task-item.done{opacity:.5}
.task-item:hover{border-color:var(--border2)}
.task-title{flex:1;font-weight:600;font-size:14px}
.task-item.done .task-title{text-decoration:line-through;color:var(--muted)}
.task-actions{display:flex;gap:8px;align-items:center;opacity:0;transition:opacity .15s}
.task-item:hover .task-actions{opacity:1}

/* Checkbox */
.chk{width:20px;height:20px;border:2px solid var(--border2);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.chk.on{background:var(--accent);border-color:var(--accent)}
.chk.on::after{content:'✓';font-size:12px;color:#000;font-weight:900}
.chk:hover:not(.on){border-color:var(--accent)}

/* Mission item */
.m-item{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer}
.m-item:last-child{border-bottom:none}
.m-item.done .m-text{text-decoration:line-through;color:var(--muted)}
.m-text{font-weight:600;font-size:14px;flex:1}
.m-num{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-left:auto}

/* Table */
.dtable{width:100%;border-collapse:collapse}
.dtable th{text-align:left;padding:10px 14px;font-family:var(--font-mono);font-size:9px;color:var(--muted2);letter-spacing:.14em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
.dtable td{padding:13px 14px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle}
.dtable tr:last-child td{border-bottom:none}
.dtable tbody tr{transition:background .15s}
.dtable tbody tr:hover{background:var(--surface2)}

/* Filter pill */
.fpill{padding:6px 15px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted2);font-family:var(--font-head);font-weight:700;font-size:11px;letter-spacing:.06em;cursor:pointer;transition:all .15s}
.fpill:hover{border-color:var(--border2);color:var(--text)}
.fpill.on{border-color:var(--accent);background:#00ff9d12;color:var(--accent)}

/* Section header */
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.sec-title{font-weight:800;font-size:18px}
.sec-sup{font-family:var(--font-mono);font-size:9px;color:var(--muted2);letter-spacing:.14em;margin-bottom:4px}

/* Grid */
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}

/* Utils */
.flex{display:flex}.items-c{align-items:center}.jc-between{justify-content:space-between}
.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}.flex-1{flex:1}.flex-wrap{flex-wrap:wrap}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}.mb-32{margin-bottom:32px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-20{margin-top:20px}
.overflow-x{overflow-x:auto}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulseDot 2s ease-in-out infinite;flex-shrink:0;display:inline-block}
.back-btn{display:inline-flex;align-items:center;gap:8px;background:none;border:none;color:var(--muted2);font-family:var(--font-head);font-size:13px;cursor:pointer;margin-bottom:22px;padding:0;transition:color .15s}
.back-btn:hover{color:var(--text)}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.loading-state{display:flex;align-items:center;justify-content:center;gap:12px;padding:60px;color:var(--muted2);font-family:var(--font-mono);font-size:12px}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:14px;opacity:.4}
.empty-text{font-family:var(--font-mono);font-size:12px}
.divider{height:1px;background:var(--border);margin:24px 0}

/* Toast */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:12px 18px;font-family:var(--font-mono);font-size:12px;color:var(--text);animation:fadeUp .3s ease both;min-width:240px;transition:opacity .3s,transform .3s}
.toast.err{border-left-color:var(--danger)}

/* Workflow */
.wf-step{display:flex;gap:16px;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--border)}
.wf-step:last-child{border-bottom:none}
.wf-num{font-family:var(--font-mono);font-size:11px;color:var(--accent);flex-shrink:0;padding-top:2px;min-width:60px}
.wf-desc{font-size:14px;color:var(--muted3);line-height:1.5}

/* Firebase notice */
.fb-notice{background:#f59e0b10;border:1px solid #f59e0b30;border-radius:var(--radius);padding:16px 20px;margin-bottom:24px;font-family:var(--font-mono);font-size:11px;color:#f59e0b;line-height:1.7}

/* Responsive */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .topbar{display:flex}
  .mobile-nav{display:block}
  .main{margin-left:0;padding:76px 16px 90px}
  .stat-chip{min-width:90px}
  .grid2,.grid3{grid-template-columns:1fr}
  .dtable th:nth-child(4),.dtable td:nth-child(4){display:none}
}
</style>
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <div class="sb-tag">Founder OS</div>
      <div class="sb-name">Control Tower</div>
    </div>
    <nav class="sb-nav">
      <div class="sb-section">Navigation</div>
      <button class="nav-btn active" data-page="dashboard"><span class="nav-icon">◈</span>Mission Command</button>
      <button class="nav-btn" data-page="ventures"><span class="nav-icon">⬡</span>Ventures</button>
      <button class="nav-btn" data-page="tasks"><span class="nav-icon">◻</span>Task Board</button>
      <button class="nav-btn" data-page="mission"><span class="nav-icon">◎</span>Weekly Mission</button>
      <div class="sb-section" style="margin-top:16px">Quick Access</div>
      <div id="quickLinks"></div>
    </nav>
    <div class="sb-footer" id="sidebarDate"></div>
  </aside>

  <div class="sb-overlay" id="overlay"></div>

  <!-- Mobile top bar -->
  <div class="topbar">
    <span class="topbar-brand">Founder OS</span>
    <button class="hamburger" id="menuBtn">☰</button>
  </div>

  <!-- Main -->
  <main class="main" id="main">
    <div class="loading-state"><div class="spinner"></div><span>Initializing Founder OS...</span></div>
  </main>

</div>

<!-- Mobile bottom nav -->
<nav class="mobile-nav">
  <div class="mobile-nav-items">
    <button class="mnav-btn active" data-page="dashboard"><span class="mnav-icon">◈</span>Dashboard</button>
    <button class="mnav-btn" data-page="ventures"><span class="mnav-icon">⬡</span>Ventures</button>
    <button class="mnav-btn" data-page="tasks"><span class="mnav-icon">◻</span>Tasks</button>
    <button class="mnav-btn" data-page="mission"><span class="mnav-icon">◎</span>Mission</button>
  </div>
</nav>

<!-- Toast container -->
<div class="toast-wrap" id="toasts"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  FOUNDER OS — Single File App
//  All data uses localStorage by default.
//  To connect Firebase: fill in FIREBASE_CONFIG below.
// ═══════════════════════════════════════════════════════════

// ── Firebase Config ──────────────────────────────────────────
// Paste your Firebase project config here to enable cloud sync.
// Leave as-is to use localStorage (works fine for personal use).
const FIREBASE_CONFIG = {
  apiKey:            "",
  authDomain:        "",
  projectId:         "",
  storageBucket:     "",
  messagingSenderId: "",
  appId:             ""
};
// ─────────────────────────────────────────────────────────────

// ── Default seed data ─────────────────────────────────────────
const SEED = {
  ventures:[
    {id:"gata",      name:"GATA Protocol",    state:"Active",   currentObjective:"Beta Launch",        weeklyOutcome:"Signup page live",      keyMetric:"500 users",   blocked:false},
    {id:"jobletters",name:"jobletters.xyz",    state:"Active",   currentObjective:"Resume AI Feature",  weeklyOutcome:"AI draft live",         keyMetric:"200 users",   blocked:true},
    {id:"teknnuku",  name:"TEKNNUKU Studio",   state:"Incubate", currentObjective:"Brand identity",     weeklyOutcome:"Logo + site live",      keyMetric:"Launch",      blocked:false},
    {id:"tek1sec",   name:"TEK1SECURITY",      state:"Maintain", currentObjective:"Client retention",   weeklyOutcome:"3 renewals closed",     keyMetric:"MRR $2k",     blocked:false},
    {id:"celestial", name:"Celestial Threads", state:"Incubate", currentObjective:"Collection design",  weeklyOutcome:"5 designs done",        keyMetric:"Pre-orders",  blocked:false},
    {id:"pawaplus",  name:"Pawaplus 9ja",      state:"Active",   currentObjective:"Market expansion",   weeklyOutcome:"Partner deals signed",  keyMetric:"10 partners", blocked:false},
    {id:"autodex",   name:"AUTODEX TRADER",    state:"Incubate", currentObjective:"Algo testing",       weeklyOutcome:"Backtest results",      keyMetric:"ROI +15%",    blocked:false},
  ],
  tasks:[
    {id:"t1",ventureId:"gata",      title:"Finish GATANow UI",               priority:"high",   completed:false,createdAt:Date.now()-7000},
    {id:"t2",ventureId:"gata",      title:"Build community onboarding flow",  priority:"high",   completed:false,createdAt:Date.now()-6000},
    {id:"t3",ventureId:"gata",      title:"Fix GATA token integration",       priority:"medium", completed:false,createdAt:Date.now()-5000},
    {id:"t4",ventureId:"gata",      title:"Finish service listing system",    priority:"low",    completed:true, createdAt:Date.now()-4000},
    {id:"t5",ventureId:"jobletters",title:"Resume AI integration",            priority:"high",   completed:false,createdAt:Date.now()-3000},
    {id:"t6",ventureId:"jobletters",title:"Landing page redesign",            priority:"medium", completed:false,createdAt:Date.now()-2000},
    {id:"t7",ventureId:"teknnuku",  title:"Create website wireframes",        priority:"low",    completed:false,createdAt:Date.now()-1000},
    {id:"t8",ventureId:"pawaplus",  title:"Draft partner agreement",          priority:"high",   completed:false,createdAt:Date.now()},
  ],
  mission:{week:"This Week",outcomes:["Launch GATA beta signup page","Enroll 10 workshop students","Release jobletters Resume AI feature","Publish weekly vlog","Close 1 TEK1SECURITY renewal"],checked:{}}
};

// ── LocalStorage DB ───────────────────────────────────────────
const LS = "founder_os_v3";
function lsLoad(){try{const r=localStorage.getItem(LS);return r?JSON.parse(r):JSON.parse(JSON.stringify(SEED))}catch{return JSON.parse(JSON.stringify(SEED))}}
function lsSave(d){try{localStorage.setItem(LS,JSON.stringify(d))}catch(e){console.warn("LS save failed",e)}}
function uid(){return Math.random().toString(36).slice(2,10)}

// ── DB API (localStorage) ─────────────────────────────────────
const DB = {
  getVentures(){return lsLoad().ventures},
  addVenture(d){const s=lsLoad();const v={id:uid(),...d};s.ventures.push(v);lsSave(s);return v},
  updateVenture(id,d){const s=lsLoad();s.ventures=s.ventures.map(v=>v.id===id?{...v,...d}:v);lsSave(s)},
  deleteVenture(id){const s=lsLoad();s.ventures=s.ventures.filter(v=>v.id!==id);s.tasks=s.tasks.filter(t=>t.ventureId!==id);lsSave(s)},
  getTasks(vid){const s=lsLoad();return vid?s.tasks.filter(t=>t.ventureId===vid):s.tasks},
  addTask(d){const s=lsLoad();const t={id:uid(),...d,completed:false,createdAt:Date.now()};s.tasks.push(t);lsSave(s);return t},
  updateTask(id,d){const s=lsLoad();s.tasks=s.tasks.map(t=>t.id===id?{...t,...d}:t);lsSave(s)},
  deleteTask(id){const s=lsLoad();s.tasks=s.tasks.filter(t=>t.id!==id);lsSave(s)},
  getMission(){return lsLoad().mission},
  saveMission(d){const s=lsLoad();s.mission=d;lsSave(s)},
  updateChecked(checked){const s=lsLoad();s.mission.checked=checked;lsSave(s)},
};

// ── Toast ─────────────────────────────────────────────────────
function toast(msg,type){
  const c=document.getElementById("toasts");
  const el=document.createElement("div");
  el.className="toast"+(type==="err"?" err":"");
  el.textContent=msg;
  c.appendChild(el);
  setTimeout(()=>{el.style.opacity="0";el.style.transform="translateY(6px)"},2200);
  setTimeout(()=>el.remove(),2600);
}

// ── Navigation ────────────────────────────────────────────────
let currentVentureId=null;

function navigate(page,vid){
  if(vid)currentVentureId=vid;

  // Update nav buttons
  document.querySelectorAll(".nav-btn,[data-page]").forEach(el=>{
    if(el.dataset.page)el.classList.toggle("active",el.dataset.page===page);
  });

  // Close mobile sidebar
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").style.display="none";

  const main=document.getElementById("main");
  main.innerHTML='<div class="loading-state"><div class="spinner"></div><span>Loading...</span></div>';

  // Render selected page
  try{
    if(page==="dashboard") renderDashboard(main);
    else if(page==="ventures") renderVentures(main);
    else if(page==="tasks") renderTasks(main);
    else if(page==="mission") renderMission(main);
    else if(page==="board") renderBoard(main,currentVentureId);
  }catch(err){
    console.error(err);
    main.innerHTML='<div class="loading-state" style="color:var(--danger)">Error rendering page — check console.</div>';
  }
}

const PRI={
  high:  {icon:"🔥",label:"High Impact",cls:"priority-high",  color:"#ff5555"},
  medium:{icon:"⚡",label:"Medium",      cls:"priority-medium",color:"#f59e0b"},
  low:   {icon:"·", label:"Low",         cls:"priority-low",   color:"#5c6f87"},
};
const STATE_TAG={Active:"tag-active",Maintain:"tag-maintain",Incubate:"tag-incubate"};
const STATE_GLOW={Active:"#00ff9d",Maintain:"#f59e0b",Incubate:"#818cf8"};

// ══════════════════════════════════════════════════════════════
//  DASHBOARD
// ══════════════════════════════════════════════════════════════
function renderDashboard(el){
  const mission=DB.getMission();

    openByV[t.ventureId]=(openByV[t.ventureId]||0)+(t.completed?0:1);
    doneByV[t.ventureId]=(doneByV[t.ventureId]||0)+(t.completed?1:0);
  });

  const totalOpen=allTasks.filter(t=>!t.completed).length;
  const totalDone=allTasks.filter(t=>t.completed).length;

  el.innerHTML=`

    <div class="page-header fade-up">
      <div class="page-sup"><span class="live-dot" style="margin-right:8px;vertical-align:middle"></span>FOUNDER CONTROL TOWER — ${new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"}).toUpperCase()}</div>

    <div class="stat-row fade-up-2">
      <div class="stat-chip"><span class="chip-val">${totalOpen}</span><span class="chip-lbl">Open Tasks</span></div>
      <div class="stat-chip"><span class="chip-val" style="color:var(--accent)">${totalDone}</span><span class="chip-lbl">Completed</span></div>
      <div class="stat-chip"><span class="chip-val" style="color:#ff5555">${highOpen}</span><span class="chip-lbl">🔥 High Priority</span></div>
      <div class="stat-chip"><span class="chip-val" style="color:var(--warn)">${blocked}</span><span class="chip-lbl">Blocked</span></div>
    </div>

    <div class="card fade-up-3 mb-24" style="position:relative;overflow:hidden">
      <div style="position:absolute;top:0;right:0;width:200px;height:200px;background:radial-gradient(circle at top right,#00ff9d07,transparent);pointer-events:none;border-radius:50%"></div>
      <div class="flex jc-between items-c mb-20">
        <div>
          <div class="card-label">THIS WEEK'S MISSION</div>
          <h2 style="font-weight:800;font-size:20px">${mission.week||"Weekly Outcomes"}</h2>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--font-mono);font-size:28px;font-weight:700;color:var(--accent)" id="mProg">${doneCount}/${total}</div>
          <div style="font-size:11px;color:var(--muted2)" id="mPct">${pct}% complete</div>
        </div>
      </div>
      <div class="prog-track mb-20"><div class="prog-fill" id="mBar" style="width:${pct}%"></div></div>
      <div id="mList">
        ${total===0?`<div class="empty-state"><div class="empty-icon">◎</div><div class="empty-text">No mission set yet.</div><button class="btn btn-sm btn-primary" style="margin-top:12px" onclick="navigate('mission')">Set Weekly Mission →</button></div>`
        :(mission.outcomes||[]).map((o,i)=>`
          <div class="m-item${checked[i]?' done':''}" data-mi="${i}">
            <div class="chk${checked[i]?' on':''}" data-mc="${i}"></div>
            <span class="m-text">${o}</span>
            <span class="m-num">${String(i+1).padStart(2,"0")}</span>

  });

  // Quick links
  populateQuickLinks(ventures);
}

// ══════════════════════════════════════════════════════════════
//  BOARD (per-venture task board)
// ══════════════════════════════════════════════════════════════
function renderBoard(el,vid){
  const ventures=DB.getVentures();
  const v=ventures.find(x=>x.id===vid);
  if(!v){el.innerHTML='<div class="empty-state"><div class="empty-text">Venture not found.</div></div>';return}

  let tasks=DB.getTasks(vid);
  let fStatus="all",fPri="all";

  const glow=STATE_GLOW[v.state]||"#00ff9d";
  const tagCls=STATE_TAG[v.state]||"tag-active";

  function getFiltered(){
    let f=[...tasks];
    if(fStatus==="pending")f=f.filter(t=>!t.completed);
    if(fStatus==="done")f=f.filter(t=>t.completed);
    if(fPri!=="all")f=f.filter(t=>t.priority===fPri);
    const po={high:0,medium:1,low:2};
    return f.sort((a,b)=>(po[a.priority]||1)-(po[b.priority]||1));
  }

  function renderList(){
    const list=document.getElementById("tList");
    if(!list)return;
    const filtered=getFiltered();
    if(filtered.length===0){list.innerHTML='<div class="empty-state"><div class="empty-icon">◻</div><div class="empty-text">No tasks match filter.</div></div>';return}
    list.innerHTML=filtered.map(t=>{
      const p=PRI[t.priority]||PRI.medium;
      return `<div class="task-item${t.completed?" done":""}" data-tid="${t.id}">
        <div class="chk${t.completed?" on":""}" data-toggle="${t.id}"></div>
        <span style="font-size:16px;flex-shrink:0">${p.icon}</span>
        <span class="task-title">${t.title}</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:${p.color};flex-shrink:0">${p.label}</span>
        <div class="task-actions">
          <span class="tag ${t.completed?"tag-done":"tag-pending"}">${t.completed?"Done":"Pending"}</span>
          <button class="btn btn-sm btn-danger" data-del="${t.id}">✕</button>
        </div>
      </div>`;
    }).join("");

    list.querySelectorAll("[data-toggle]").forEach(b=>{
      b.addEventListener("click",()=>{
        const t=tasks.find(x=>x.id===b.dataset.toggle);if(!t)return;
        t.completed=!t.completed;
        DB.updateTask(t.id,{completed:t.completed});
        updateStats();renderList();
        toast(t.completed?"✓ Task completed":"Task reopened");
      });
    });
    list.querySelectorAll("[data-del]").forEach(b=>{
      b.addEventListener("click",()=>{
        const t=tasks.find(x=>x.id===b.dataset.del);
        if(!confirm(`Delete "${t?.title}"?`))return;
        DB.deleteTask(b.dataset.del);
        tasks=tasks.filter(x=>x.id!==b.dataset.del);
        updateStats();renderList();toast("Task deleted");
      });
    });
  }

  function updateStats(){
    const so=document.getElementById("sOpen"),sd=document.getElementById("sDone");
    if(so)so.textContent=tasks.filter(t=>!t.completed).length;
    if(sd)sd.textContent=tasks.filter(t=>t.completed).length;
  }

  el.innerHTML=`
  <div>
    <button class="back-btn" onclick="navigate('dashboard')">← Back to Dashboard</button>
    <div class="page-header fade-up">
      <div class="flex gap-8 mb-8 flex-wrap">
        <span class="tag ${tagCls}">${v.state}</span>
        ${v.blocked?'<span class="tag tag-blocked">Blocked</span>':''}
      </div>
      <div class="flex jc-between items-c flex-wrap gap-12">
        <h1 class="page-title">${v.name}</h1>
        <div class="flex gap-12">
          <div class="stat-chip" style="min-width:80px;text-align:center"><span class="chip-val" id="sOpen">${tasks.filter(t=>!t.completed).length}</span><span class="chip-lbl">OPEN</span></div>
          <div class="stat-chip" style="min-width:80px;text-align:center"><span class="chip-val" id="sDone" style="color:var(--accent)">${tasks.filter(t=>t.completed).length}</span><span class="chip-lbl">DONE</span></div>
        </div>
      </div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted2);margin-top:8px">${v.currentObjective||"—"} · ${v.weeklyOutcome||"—"} · <span style="color:var(--accent)">${v.keyMetric||"—"}</span></div>
    </div>

    <div class="card fade-up-2 mb-20">
      <div class="card-label">ADD TASK</div>
      <div class="form-row">
        <div class="form-group" style="flex:3"><input id="tInput" placeholder="Task title..." /></div>
        <div class="form-group" style="flex:1;min-width:150px">
          <select id="tPri"><option value="high">🔥 High Impact</option><option value="medium" selected>⚡ Medium</option><option value="low">· Low</option></select>
        </div>
        <div style="display:flex;align-items:flex-end"><button class="btn btn-md btn-primary" id="addBtn">+ Add Task</button></div>
      </div>
    </div>

    <div class="flex gap-8 mb-16 flex-wrap fade-up-3">
      <button class="fpill on" data-sf="all">ALL</button>
      <button class="fpill" data-sf="pending">PENDING</button>
      <button class="fpill" data-sf="done">DONE</button>
      <div style="width:1px;height:20px;background:var(--border);margin:0 2px;align-self:center"></div>
      <button class="fpill on" data-pf="all">ALL PRIORITY</button>
      <button class="fpill" data-pf="high">🔥 HIGH</button>
      <button class="fpill" data-pf="medium">⚡ MEDIUM</button>
      <button class="fpill" data-pf="low">· LOW</button>
    </div>

    <div id="tList" class="fade-up-4" style="display:flex;flex-direction:column;gap:8px"></div>
  </div>`;

  renderList();

  // Add task
  const doAdd=()=>{
    const title=document.getElementById("tInput").value.trim();
    if(!title){toast("Task title required","err");return}
    const t=DB.addTask({ventureId:vid,title,priority:document.getElementById("tPri").value});
    tasks.push(t);
    document.getElementById("tInput").value="";
    updateStats();renderList();toast("✓ Task added");
  };
  document.getElementById("addBtn").addEventListener("click",doAdd);
  document.getElementById("tInput").addEventListener("keydown",e=>{if(e.key==="Enter")doAdd()});

  // Status filters
  el.querySelectorAll("[data-sf]").forEach(p=>{
    p.addEventListener("click",()=>{
      el.querySelectorAll("[data-sf]").forEach(x=>x.classList.remove("on"));
      p.classList.add("on");fStatus=p.dataset.sf;renderList();
    });
  });
  // Priority filters
  el.querySelectorAll("[data-pf]").forEach(p=>{
    p.addEventListener("click",()=>{
      el.querySelectorAll("[data-pf]").forEach(x=>x.classList.remove("on"));
      p.classList.add("on");fPri=p.dataset.pf;renderList();
    });
  });
}

// ══════════════════════════════════════════════════════════════
//  GLOBAL TASK TABLE
// ══════════════════════════════════════════════════════════════
function renderTasks(el){
  const ventures=DB.getVentures();
  let allTasks=DB.getTasks();
  const vMap={};ventures.forEach(v=>{vMap[v.id]=v.name});
  let fStatus="all",fVenture="all",fPri="all";
  const high=allTasks.filter(t=>t.priority==="high"&&!t.completed).length;

  function getFiltered(){
    let f=[...allTasks];
    if(fStatus==="pending")f=f.filter(t=>!t.completed);
    if(fStatus==="done")f=f.filter(t=>t.completed);
    if(fVenture!=="all")f=f.filter(t=>t.ventureId===fVenture);
    if(fPri!=="all")f=f.filter(t=>t.priority===fPri);
    const po={high:0,medium:1,low:2};
    return f.sort((a,b)=>(po[a.priority]||1)-(po[b.priority]||1));
  }

  function renderTable(){
    const tbody=document.getElementById("gBody");
    const countEl=document.getElementById("tCount");
    if(!tbody)return;
    const f=getFiltered();
    if(countEl)countEl.textContent=`${f.length} task${f.length!==1?"s":""}`;
    if(f.length===0){tbody.innerHTML=`<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">◻</div><div class="empty-text">No tasks match filters.</div></div></td></tr>`;return}
    tbody.innerHTML=f.map(t=>{
      const p=PRI[t.priority]||PRI.medium;
      return `<tr style="opacity:${t.completed?.55:1}">
        <td><div class="chk${t.completed?" on":""}" data-toggle="${t.id}"></div></td>
        <td><button class="vlink" data-vid="${t.ventureId}" style="background:none;border:none;color:var(--accent);font-family:var(--font-head);font-weight:700;font-size:13px;cursor:pointer;padding:0">${vMap[t.ventureId]||t.ventureId}</button></td>
        <td style="font-weight:600;font-size:14px;${t.completed?"text-decoration:line-through;color:var(--muted)":""}">${t.title}</td>
        <td style="font-family:var(--font-mono);font-size:11px;color:${p.color}">${p.icon} ${p.label}</td>
        <td><span class="tag ${t.completed?"tag-done":"tag-pending"}">${t.completed?"Done":"Pending"}</span></td>
      </tr>`;
    }).join("");

    tbody.querySelectorAll("[data-toggle]").forEach(b=>{
      b.addEventListener("click",()=>{
        const t=allTasks.find(x=>x.id===b.dataset.toggle);if(!t)return;
        t.completed=!t.completed;DB.updateTask(t.id,{completed:t.completed});
        renderTable();toast(t.completed?"✓ Completed":"Reopened");
      });
    });
    tbody.querySelectorAll(".vlink").forEach(b=>{b.addEventListener("click",()=>navigate("board",b.dataset.vid))});
  }

  el.innerHTML=`
  <div>
    <div class="page-header fade-up">
      <div class="page-sup">CROSS-VENTURE VIEW</div>
      <div class="flex jc-between items-c flex-wrap gap-12">
        <h1 class="page-title">Open <span class="accent">Task Board.</span></h1>
        ${high>0?`<div style="background:#ff444412;border:1px solid #ff444428;border-radius:8px;padding:12px 18px;display:flex;align-items:center;gap:12px"><span style="font-size:20px">🔥</span><div><div style="font-family:var(--font-mono);font-size:20px;font-weight:700;color:#ff5555">${high}</div><div style="font-size:10px;color:var(--muted2);letter-spacing:.08em">HIGH PRIORITY OPEN</div></div></div>`:""}
      </div>
    </div>

    <div class="card fade-up-2 mb-20">
      <div class="form-row" style="align-items:flex-end">
        <div class="form-group" style="flex:2">
          <label class="form-label">FILTER BY VENTURE</label>
          <select id="vFilter">
            <option value="all">All Ventures</option>
            ${ventures.map(v=>`<option value="${v.id}">${v.name}</option>`).join("")}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">PRIORITY</label>
          <select id="pFilter">
            <option value="all">All Priorities</option>
            <option value="high">🔥 High</option>
            <option value="medium">⚡ Medium</option>
            <option value="low">· Low</option>
          </select>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;padding-bottom:1px">
          <button class="fpill on" data-sf="all">ALL</button>
          <button class="fpill" data-sf="pending">PENDING</button>
          <button class="fpill" data-sf="done">DONE</button>
        </div>
      </div>
    </div>

    <div class="card fade-up-3">
      <div class="flex jc-between items-c mb-16">
        <div class="card-label" style="margin-bottom:0">TASKS</div>
        <span id="tCount" style="font-family:var(--font-mono);font-size:11px;color:var(--muted2)"></span>
      </div>
      <div class="overflow-x">
        <table class="dtable">
          <thead><tr><th style="width:40px"></th><th>Venture</th><th>Task</th><th>Priority</th><th>Status</th></tr></thead>
          <tbody id="gBody"></tbody>
        </table>
      </div>
    </div>
  </div>`;

  renderTable();
  el.querySelector("#vFilter").addEventListener("change",e=>{fVenture=e.target.value;renderTable()});
  el.querySelector("#pFilter").addEventListener("change",e=>{fPri=e.target.value;renderTable()});
  el.querySelectorAll("[data-sf]").forEach(p=>{p.addEventListener("click",()=>{el.querySelectorAll("[data-sf]").forEach(x=>x.classList.remove("on"));p.classList.add("on");fStatus=p.dataset.sf;renderTable()})});
}

// ══════════════════════════════════════════════════════════════
//  WEEKLY MISSION
// ══════════════════════════════════════════════════════════════
function renderMission(el){
  const m=DB.getMission();

  el.innerHTML=`
  <div>
    <div class="page-header fade-up">
      <div class="page-sup">SUNDAY PLANNING RITUAL</div>
      <h1 class="page-title">Weekly Mission <span class="accent">Command.</span></h1>
    </div>

    <div class="card fade-up-2 mb-20" style="max-width:700px">
      <div class="card-label">WEEK LABEL</div>
      <input id="wLabel" value="${m.week||""}" placeholder="e.g. March 10 – 16" style="margin-bottom:24px"/>
      <div class="card-label">MISSION-CRITICAL OUTCOMES — ONE PER LINE</div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted2);margin-bottom:10px">These become your daily mission checklist on the dashboard.</div>
      <textarea id="wText" rows="10" placeholder="Launch GATA beta page&#10;Enroll 10 workshop students&#10;Release jobletters feature&#10;Publish weekly vlog">${(m.outcomes||[]).join("\n")}</textarea>
      <div class="flex items-c gap-16 mt-16 flex-wrap">
        <button class="btn btn-lg btn-primary" id="saveM">Save Mission →</button>
        <button class="btn btn-md btn-ghost" id="clearM">Clear All</button>
        <span id="savedMsg" style="font-family:var(--font-mono);font-size:12px;color:var(--accent);opacity:0;transition:opacity .3s">✓ Saved to Control Tower</span>
      </div>
    </div>

    <div class="card fade-up-3 mb-20" style="max-width:700px">
      <div class="card-label">CURRENT MISSION PREVIEW</div>
      <div id="preview">
        ${(m.outcomes||[]).length===0
          ?'<div class="empty-state"><div class="empty-icon">◎</div><div class="empty-text">No outcomes set yet.</div></div>'
          :(m.outcomes||[]).map((o,i)=>`<div style="display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)"><span style="font-family:var(--font-mono);font-size:11px;color:var(--accent);min-width:24px">${String(i+1).padStart(2,"0")}</span><span style="font-weight:600;font-size:14px">${o}</span></div>`).join("")}
      </div>
    </div>

    <div class="card fade-up-4" style="max-width:700px">
      <div class="card-label">YOUR FOUNDER WORKFLOW</div>
      <div class="wf-step"><span class="wf-num">SUNDAY</span><span class="wf-desc">Define your 3–5 mission-critical outcomes. These are the only things that truly matter this week.</span></div>
      <div class="wf-step"><span class="wf-num">DAILY</span><span class="wf-desc">Open the Dashboard. Only work on tasks that directly drive your weekly outcomes. Ignore everything else.</span></div>
      <div class="wf-step"><span class="wf-num">TRACKING</span><span class="wf-desc">Check off outcomes as completed. Your progress bar on the Dashboard updates in real time.</span></div>
      <div class="wf-step"><span class="wf-num">REVIEW</span><span class="wf-desc">Every Friday: review what shipped vs what didn't. Carry unfinished outcomes to next week.</span></div>
    </div>
  </div>`;

  el.querySelector("#saveM").addEventListener("click",()=>{
    const week=el.querySelector("#wLabel").value.trim();
    const outcomes=el.querySelector("#wText").value.split("\n").map(s=>s.trim()).filter(Boolean);
    if(!outcomes.length){toast("Add at least one outcome","err");return}
    DB.saveMission({week:week||"This Week",outcomes,checked:{}});
    toast("✓ Mission saved to Control Tower");
    const msg=el.querySelector("#savedMsg");msg.style.opacity="1";setTimeout(()=>{msg.style.opacity="0"},2500);
    el.querySelector("#preview").innerHTML=outcomes.map((o,i)=>`<div style="display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)"><span style="font-family:var(--font-mono);font-size:11px;color:var(--accent);min-width:24px">${String(i+1).padStart(2,"0")}</span><span style="font-weight:600;font-size:14px">${o}</span></div>`).join("");
  });
  el.querySelector("#clearM").addEventListener("click",()=>{if(confirm("Clear all outcomes?")){el.querySelector("#wText").value="";el.querySelector("#wLabel").value=""}});
}

// ── Quick Links ───────────────────────────────────────────────
function populateQuickLinks(ventures){
  const c=document.getElementById("quickLinks");
  if(!c)return;
  c.innerHTML=(ventures||[]).slice(0,6).map(v=>`
    <button class="nav-btn" style="font-size:12px;padding:7px 12px" data-qlid="${v.id}">
      <span class="nav-icon" style="font-size:10px">→</span>${v.name}
    </button>`).join("");
  c.querySelectorAll("[data-qlid]").forEach(b=>{b.addEventListener("click",()=>navigate("board",b.dataset.qlid))});
}

// ── Init ──────────────────────────────────────────────────────
function init(){
  // Date in sidebar
  const dateEl=document.getElementById("sidebarDate");
  if(dateEl)dateEl.textContent=new Date().toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"}).toUpperCase();

  // Nav buttons
  document.querySelectorAll("[data-page]").forEach(el=>{
    el.addEventListener("click",()=>{
      const page=el.dataset.page;
      if(page)navigate(page);
    });
  });

  // Mobile menu
  document.getElementById("menuBtn").addEventListener("click",()=>{
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("overlay").style.display="block";
  });
  document.getElementById("overlay").addEventListener("click",()=>{
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("overlay").style.display="none";
  });

  // Kick off
  navigate("dashboard");
}

// Run immediately — no DOMContentLoaded needed for inline scripts
init();
</script>
</body>
</html>
